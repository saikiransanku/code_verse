{% extends 'core/base.html' %}

{% block content %}
<!-- Header -->
<header class="w-full p-4 flex justify-between items-center z-10">
    <div class="flex items-center space-x-2">
        <span class="font-semibold text-lg tracking-tight hover:opacity-80 transition cursor-pointer text-gray-700 dark:text-gray-300">
            <span class="flex items-center gap-1">antiqcoder v0.1</span>
        </span>
    </div>
    
    <div class="flex items-center gap-4 relative">
        <!-- Theme Toggle Dropdown -->
        <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" @click.outside="open = false" 
                class="flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-dark-surface transition border border-transparent hover:border-gray-200 dark:hover:border-dark-border text-sm font-medium"
                aria-label="Theme Settings">
                <!-- Theme Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 0 0-5.78 1.128 2.25 2.25 0 0 1-2.4 2.245 4.5 4.5 0 0 0 8.4-2.245c0-.399-.078-.78-.22-1.128Zm0 0a15.998 15.998 0 0 0 3.388-1.62m-5.043-.025a15.994 15.994 0 0 1 1.622-3.395m3.42 3.42a15.995 15.995 0 0 0 4.764-4.648l3.813-3.814a1.125 1.125 0 0 0-1.59-1.59l-3.814 3.813m-4.764 4.648 3.813 3.813a1.125 1.125 0 0 0 1.59-1.59l-3.813-3.813m-4.764 4.648H12m-1.622-3.395A15.998 15.998 0 0 1 15.75 6.475m-3.42 3.42A16.035 16.035 0 0 1 12 12m0 0h.01M12 12A15.997 15.997 0 0 0 15.75 16.5m0-10.025a1.125 1.125 0 0 0-1.59-1.59V4.875" />
                </svg>
                Theme
            </button>
            
            <div x-show="open" x-transition.opacity
                class="absolute right-0 mt-2 w-36 bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.1)] py-1"
                style="display: none;" x-cloak>
                <button @click="setTheme('light'); open = false" class="w-full text-left flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-input transition" :class="theme === 'light' ? 'font-semibold' : ''">Light</button>
                <button @click="setTheme('dark'); open = false" class="w-full text-left flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-input transition" :class="theme === 'dark' ? 'font-semibold' : ''">Dark</button>
                <button @click="setTheme('system'); open = false" class="w-full text-left flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-input transition border-t border-light-border dark:border-dark-border mt-1 pt-2" :class="theme === 'system' ? 'font-semibold' : ''">System</button>
            </div>
        </div>

        <!-- Profile Icon -->
        <button class="w-8 h-8 rounded-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface flex items-center justify-center text-gray-500 hover:bg-gray-50 dark:hover:bg-dark-input transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
        </button>
    </div>
</header>

<!-- Main Chat Area -->
<main class="flex-1 flex flex-col items-center justify-center -mt-16 px-4">
    <!-- Center text -->
    <h1 class="text-[28px] sm:text-[32px] font-semibold mb-10 text-center text-gray-800 dark:text-gray-200 font-sans tracking-tight">
        What can I help with?
    </h1>

    <!-- Input Box -->
    <div class="w-full max-w-[768px] relative">
        <div class="relative flex items-end bg-light-surface dark:bg-dark-surface rounded-[24px] p-2 transition-all shadow-sm border border-transparent dark:border-dark-border">
            <!-- Attachment Icon (+) -->
            <button class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 p-[10px] m-1 rounded-full hover:bg-gray-200 dark:hover:bg-dark-input transition flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </button>

            <!-- Text Input Wrapper to allow multiline-like spacing -->
            <div class="flex-1 px-1 py-[14px] min-h-[52px]">
                <input type="text" placeholder="Upload plant image or ask anything" 
                       class="w-full bg-transparent border-none outline-none focus:ring-0 text-gray-800 dark:text-gray-200 placeholder-gray-500 dark:placeholder-gray-400 text-[16px]">
            </div>

            <!-- Right Actions (Mic and Submit) -->
            <div class="flex items-center gap-1.5 p-1 flex-shrink-0">
                <!-- Mic Icon -->
                <button class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 p-[10px] rounded-full hover:bg-gray-200 dark:hover:bg-dark-input transition flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                    </svg>
                </button>
                <!-- Submit Icon (Waveform) -->
                <button class="bg-black text-white dark:bg-white dark:text-black p-2 rounded-full hover:opacity-80 transition shadow-[0_2px_4px_rgba(0,0,0,0.1)] flex items-center justify-center w-[34px] h-[34px]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-audio-lines">
                        <path d="M2 10v3"/><path d="M6 6v11"/><path d="M10 3v18"/><path d="M14 8v7"/><path d="M18 5v13"/><path d="M22 10v3"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="text-center mt-3 text-xs text-gray-500 dark:text-[#a0a0a0]">
            AI-Driven Early Detection and Mapping of Wheat Diseases.
        </div>
    </div>
</main>
{% endblock %}
